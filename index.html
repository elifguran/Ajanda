<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>2026 Takvimli Ajanda</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

h1{
margin-top:20px;
}

.baslik{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin:20px;
}

button{
padding:10px;
font-size:18px;
cursor:pointer;
}

.takvim{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
max-width:700px;
margin:auto;
}

.gun{
background:white;
border:1px solid #ccc;
padding:10px;
height:80px;
cursor:pointer;
}

.gun:hover{
background:#eaeaea;
}

.haftaGunleri{
display:grid;
grid-template-columns:repeat(7,1fr);
max-width:700px;
margin:auto;
font-weight:bold;
margin-bottom:5px;
}

.bugun{
background:#ffd6d6;
border:2px solid red;
}
</style>
</head>

<body>

<h1>2026 Takvimli Ajanda</h1>

<div class="baslik">
<button onclick="oncekiAy()">⬅</button>
<h2 id="ayBaslik"></h2>
<button onclick="sonrakiAy()">➡</button>
</div>

<div class="haftaGunleri">
<div>Pzt</div>
<div>Sal</div>
<div>Çar</div>
<div>Per</div>
<div>Cum</div>
<div>Cts</div>
<div>Paz</div>
</div>

<div class="takvim" id="takvim"></div>

<script>
const aylar=[
"Ocak","Şubat","Mart","Nisan","Mayıs","Haziran",
"Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"
];

const bugun = new Date();
let gecerliAy = bugun.getMonth();

function takvimCiz(){

const takvim=document.getElementById("takvim");
takvim.innerHTML="";

document.getElementById("ayBaslik").innerText=
aylar[gecerliAy]+" 2026";

let ilkGun=new Date(2026,gecerliAy,1).getDay();
if(ilkGun===0) ilkGun=7;

let toplamGun=new Date(2026,gecerliAy+1,0).getDate();

const bugunYil = bugun.getFullYear();
const bugunAy = bugun.getMonth();
const bugunTarih = bugun.getDate();

for(let i=1;i<ilkGun;i++){
let bos=document.createElement("div");
takvim.appendChild(bos);
}

for(let d=1;d<=toplamGun;d++){

let div=document.createElement("div");
div.className="gun";

if(bugunYil===2026 && bugunAy===gecerliAy && bugunTarih===d){
div.classList.add("bugun");
}

div.innerHTML=`<b>${d}</b>`;

takvim.appendChild(div);
}
}

function sonrakiAy(){
if(gecerliAy<11){
gecerliAy++;
takvimCiz();
}
}

function oncekiAy(){
if(gecerliAy>0){
gecerliAy--;
takvimCiz();
}
}

takvimCiz();
</script>

</body>
</html>
